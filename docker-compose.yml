version: '3.8'

services:
  # Servicio para ejecutar tests
  tests:
    build: .
    container_name: zoopicasso-tests
    volumes:
      - ./generar_para_email:/app
      - ./htmlcov:/app/htmlcov
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "pytest tests/ -v --ignore=tests/e2e/ --cov=src --cov=web --cov-report=html"

  # Servicio para ejecutar la API en desarrollo
  api:
    build: .
    container_name: zoopicasso-api
    ports:
      - "8000:8000"
    volumes:
      - ./generar_para_email:/app
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    command: >
      uvicorn web.app:app --host 0.0.0.0 --port 8000 --reload

  # Servicio para ejecutar tests e2e con Playwright
  e2e:
    build: .
    container_name: zoopicasso-e2e
    volumes:
      - ./generar_para_email:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      pytest tests/e2e/test_cierres.py -v --no-cov
