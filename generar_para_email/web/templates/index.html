<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturas | Zoo Picasso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="bg-shape one"></div>
  <div class="bg-shape two"></div>

  <main class="shell">
    <section id="login-card" class="card active">
      <h1>Generador de Facturas</h1>
      <p>Zoo Picasso · Acceso seguro</p>
      <label>Usuario
        <input id="usuario" type="text" placeholder="Giselle" autocomplete="username" />
      </label>
      <label>Contraseña
        <input id="password" type="password" autocomplete="current-password" />
      </label>
      <button id="btn-login">Entrar</button>
      <p id="login-error" class="error"></p>
    </section>

    <section id="app-card" class="card">
      <div class="header-row">
        <div>
          <h2>Factura Web</h2>
          <p id="estado">Completa los datos y genera el Excel.</p>
        </div>
        <button id="btn-logout" class="ghost">Salir</button>
      </div>

      <div class="grid two">
        <label>Cliente (opcional)
          <input id="cliente_nombre" type="text" />
        </label>
        <label>NIF/CIF (opcional)
          <input id="cliente_nif" type="text" />
        </label>
      </div>

      <div class="lineas-head">
        <h3>Líneas</h3>
        <button id="btn-add" class="ghost">+ Añadir línea</button>
      </div>
      <div id="lineas"></div>

      <div class="totales">
        <span>Subtotal:</span><strong id="subtotal">0.00 €</strong>
        <span>IVA:</span><strong>Incluido</strong>
        <span>Total:</span><strong id="total">0.00 €</strong>
        <span>Facturas del día:</span><strong id="facturas-dia">0</strong>
        <span>Acumulado del día:</span><strong id="acumulado-dia">0.00 €</strong>
      </div>

      <div class="lineas-head">
        <h3>Ajuste Manual</h3>
      </div>
      <div class="fila">
        <input id="ajuste" type="number" min="0" step="0.01" placeholder="Importe a restar del acumulado" />
        <button id="btn-restar" class="ghost" type="button">Restar</button>
      </div>

      <button id="btn-generar" class="cta">Generar factura y descargar</button>
      <p id="resultado" class="ok"></p>
      <p id="error" class="error"></p>
    </section>
  </main>

  <script>
    const loginCard = document.getElementById('login-card');
    const appCard = document.getElementById('app-card');
    const lineasEl = document.getElementById('lineas');
    const subtotalEl = document.getElementById('subtotal');
    const totalEl = document.getElementById('total');
    const facturasDiaEl = document.getElementById('facturas-dia');
    const acumuladoDiaEl = document.getElementById('acumulado-dia');
    const estadoEl = document.getElementById('estado');
    const resultadoEl = document.getElementById('resultado');
    const errorEl = document.getElementById('error');
    const ajusteEl = document.getElementById('ajuste');
    let acumuladoDia = 0;
    let facturasDia = 0;

    function sha256(text) {
      return crypto.subtle.digest('SHA-256', new TextEncoder().encode(text)).then(buf =>
        [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('')
      );
    }

    function toggleView(loggedIn) {
      loginCard.classList.toggle('active', !loggedIn);
      appCard.classList.toggle('active', loggedIn);
    }

    function calcTotals() {
      const filas = [...lineasEl.querySelectorAll('.fila')];
      let total = 0;
      for (const fila of filas) {
        const cant = parseInt(fila.querySelector('.cantidad').value || '0', 10);
        const precio = parseFloat(fila.querySelector('.precio').value || '0');
        const parcial = Number.isFinite(cant) && Number.isFinite(precio) ? cant * precio : 0;
        fila.querySelector('.parcial').textContent = parcial.toFixed(2);
        total += parcial;
      }
      subtotalEl.textContent = `${total.toFixed(2)} €`;
      totalEl.textContent = `${total.toFixed(2)} €`;
    }

    function addLinea(concepto = '', cantidad = 1, precio = 0) {
      const row = document.createElement('div');
      row.className = 'fila';
      row.innerHTML = `
        <input class="concepto" placeholder="Concepto" value="${concepto}" />
        <input class="cantidad" type="number" min="1" value="${cantidad}" />
        <input class="precio" type="number" min="0" step="0.01" value="${precio}" />
        <span class="parcial">0.00</span>
        <button class="del" type="button">×</button>
      `;
      row.querySelector('.cantidad').addEventListener('input', calcTotals);
      row.querySelector('.precio').addEventListener('input', calcTotals);
      row.querySelector('.del').addEventListener('click', () => {
        if (lineasEl.children.length <= 1) return;
        row.remove();
        calcTotals();
      });
      lineasEl.appendChild(row);
      calcTotals();
    }

    function resetFormulario() {
      document.getElementById('cliente_nombre').value = '';
      document.getElementById('cliente_nif').value = '';
      lineasEl.innerHTML = '';
      addLinea();
    }

    function confirmarSalida(mensaje) {
      return window.confirm(mensaje);
    }

    function restarAcumulado() {
      errorEl.textContent = '';
      const ajuste = Number((ajusteEl.value || '').replace(',', '.'));

      if (!Number.isFinite(ajuste) || ajuste <= 0) {
        errorEl.textContent = 'Introduce un importe válido mayor que 0 para ajustar.';
        return;
      }

      if (ajuste > acumuladoDia) {
        errorEl.textContent = 'El ajuste no puede superar el acumulado del día.';
        return;
      }

      acumuladoDia = Number((acumuladoDia - ajuste).toFixed(2));
      acumuladoDiaEl.textContent = `${acumuladoDia.toFixed(2)} €`;
      resultadoEl.textContent = `Ajuste aplicado: -${ajuste.toFixed(2)} € al acumulado.`;
      ajusteEl.value = '';
    }

    async function request(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        credentials: 'same-origin',
        ...options,
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || 'Error inesperado');
      }
      return res.json().catch(() => ({}));
    }

    document.getElementById('btn-login').addEventListener('click', async () => {
      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;
      const error = document.getElementById('login-error');
      error.textContent = '';

      try {
        const password_hash = await sha256(password);
        await request('/api/login', {
          method: 'POST',
          body: JSON.stringify({ usuario, password_hash }),
        });
        toggleView(true);
      } catch (e) {
        error.textContent = e.message;
      }
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
      if (!confirmarSalida('Si sales ahora, se reiniciará la sumatoria diaria de esta sesión. ¿Deseas continuar?')) {
        return;
      }
      await request('/api/logout', { method: 'POST', body: '{}' });
      facturasDia = 0;
      facturasDiaEl.textContent = '0';
      acumuladoDia = 0;
      acumuladoDiaEl.textContent = '0.00 €';
      resetFormulario();
      toggleView(false);
    });

    document.getElementById('btn-add').addEventListener('click', () => addLinea());
    document.getElementById('btn-restar').addEventListener('click', restarAcumulado);
    ajusteEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        restarAcumulado();
      }
    });

    document.getElementById('btn-generar').addEventListener('click', async () => {
      resultadoEl.textContent = '';
      errorEl.textContent = '';

      const lineas = [...lineasEl.querySelectorAll('.fila')].map((fila) => ({
        concepto: fila.querySelector('.concepto').value.trim(),
        cantidad: Number(fila.querySelector('.cantidad').value),
        precio_unitario: Number(fila.querySelector('.precio').value),
      }));

      try {
        const data = await request('/api/generar', {
          method: 'POST',
          body: JSON.stringify({
            cliente_nombre: document.getElementById('cliente_nombre').value,
            cliente_nif: document.getElementById('cliente_nif').value,
            lineas,
          }),
        });

        resultadoEl.textContent = `Factura ${data.numero} generada. Descargando...`;
        estadoEl.textContent = `Última factura: ${data.numero}`;
        facturasDia += 1;
        facturasDiaEl.textContent = String(facturasDia);
        acumuladoDia += Number(data.total);
        acumuladoDiaEl.textContent = `${acumuladoDia.toFixed(2)} €`;
        const a = document.createElement('a');
        a.href = data.download_url;
        a.download = data.archivo;
        document.body.appendChild(a);
        a.click();
        a.remove();
        resetFormulario();
      } catch (e) {
        errorEl.textContent = e.message;
      }
    });

    window.addEventListener('beforeunload', (event) => {
      if (!appCard.classList.contains('active')) {
        return;
      }
      event.preventDefault();
      event.returnValue = 'Si cierras la pestaña se reiniciará la sumatoria diaria de esta sesión.';
    });

    async function bootstrap() {
      try {
        const session = await request('/api/session');
        toggleView(Boolean(session.logged_in));
      } catch {
        toggleView(false);
      }
      addLinea();
    }

    bootstrap();
  </script>
</body>
</html>
